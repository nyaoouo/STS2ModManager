name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Restore NuGet packages
        run: dotnet restore STS2ModManager.csproj

      - name: Build release artifacts
        shell: cmd
        env:
          STS2_MODMANAGER_NONINTERACTIVE: "1"
        run: STS2ModManager.build.cmd all ${{ github.ref_name }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2.6.1
        with:
          generate_release_notes: true
          files: |
            .dist/ModManager.FrameworkDependent.exe
            .dist/ModManager.NativeAot.exe