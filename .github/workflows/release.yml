name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build release artifacts
        shell: cmd
        env:
          STS2_MODMANAGER_NONINTERACTIVE: "1"
        run: STS2ModManager.build.cmd all

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            .dist/ModManager.FrameworkDependent.exe
            .dist/ModManager.NativeAot.exe